name: Daily Digest (Fallback)

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # Daily schedule at 14:05 UTC (5 minutes after Vercel cron as fallback)
  schedule:
    - cron: "5 14 * * *"

jobs:
  trigger-digest:
    name: Trigger Daily Digest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Vercel Cron Endpoint
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$VERCEL_APP_URL" ]; then
            echo "VERCEL_APP_URL secret not set. Skipping."
            exit 1
          fi

          echo "Triggering digest at ${VERCEL_APP_URL}/api/cron"

          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            "${VERCEL_APP_URL}/api/cron")

          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Digest trigger failed with status $RESPONSE"
            exit 1
          fi

          echo "Digest triggered successfully."

  # Alternative: run digest directly if you prefer not to call the Vercel endpoint
  # Uncomment and configure this job instead if you want a self-contained GitHub Actions run
